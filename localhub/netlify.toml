[build]
  base = "localhub"
  command = "chmod +x ./node_modules/.bin/vite && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  included_files = ["public/data/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200